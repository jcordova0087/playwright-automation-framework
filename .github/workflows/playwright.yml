name: Playwright Tests (CI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/workspace-node@v4
      with:
        node-version: lts/*
        cache: 'npm' # Optimiza el tiempo de instalación cacheando node_modules

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      env:
        # Inyectamos de forma segura las variables de entorno obligatorias que diseñamos
        BASE_URL: ${{ secrets.BASE_URL }}
        API_URL: ${{ secrets.API_URL }}
        USERNAME: ${{ secrets.USERNAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: npx playwright test

    - name: Upload Test Report Artifact
      html: always
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }} # Se ejecuta aunque fallen las pruebas para no perder el reporte
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30